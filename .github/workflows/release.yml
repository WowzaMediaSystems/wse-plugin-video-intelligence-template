name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract WSE libs from wowza-streaming-engine image
        run: |
          mkdir -p wse-lib
          docker run --rm \
            -v "$(pwd)/wse-lib:/output" \
            --user "$(id -u):$(id -g)" \
            --entrypoint sh \
            wowza/wowza-streaming-engine:latest-slim \
            -c 'cp /usr/local/WowzaStreamingEngine/lib.default/*.jar /output/'
          echo "Extracted $(ls -1 wse-lib/*.jar | wc -l | xargs) WSE JAR files"

      - name: Build & publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_SIGNING_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_SIGNING_KEY }}
          MAVEN_CENTRAL_GPG_SIGNING_PASSWORD: ${{ secrets.MAVEN_CENTRAL_GPG_SIGNING_PASSWORD }}
        run: ./gradlew build publish -PwseLibDir=./wse-lib --no-daemon
